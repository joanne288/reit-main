<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="assets/img/favicon.ico" type="image/x-icon">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link rel="stylesheet" href="assets/css/styles.css">
  <title>My Profile — JM&amp;RA</title>
  <style>
    .profile-page { padding: 6rem 0 4rem; }
    .profile-page .container { max-width: 1024px; margin: 0 auto; padding: 0 1.5rem; }
    .header { position: fixed; top: 0; left: 0; width: 100%; background-color: var(--body-color); box-shadow: 0 1px 4px hsla(220,30%,20%,.1); z-index: 100; }
    nav { height: 3.5rem; display: flex; justify-content: space-between; align-items: center; max-width: 1024px; margin: 0 auto; padding: 0 1.5rem; }
    .nav__logo { color: var(--first-color); display: inline-flex; align-items: center; gap: .25rem; font-weight: var(--font-semi-bold); font-size: var(--h3-font-size); }
    .nav__links { display: flex; align-items: center; gap: 2rem; }
    .nav__links a { color: var(--text-color); font-size: var(--small-font-size); font-weight: var(--font-medium); transition: .3s; }
    .nav__links a:hover { color: var(--first-color); }
    .theme-btn { background: none; border: 2px solid var(--border-color); border-radius: .4rem; padding: .3rem .5rem; cursor: pointer; color: var(--title-color); font-size: 1rem; transition: .3s; }
    .theme-btn:hover { border-color: var(--first-color); color: var(--first-color); }

    /* LAYOUT */
    .profile-grid { display: grid; grid-template-columns: 280px 1fr; gap: 1.5rem; align-items: start; }
    .panel { background-color: var(--container-color); border: 2px solid var(--border-color); border-radius: 1rem; padding: 1.5rem; }
    .panel__title { font-size: var(--h3-font-size); color: var(--title-color); margin-bottom: 1.25rem; display: flex; align-items: center; gap: .5rem; }
    .panel__title i { color: var(--first-color); }

    /* PROFILE CARD */
    .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: var(--first-color-lighten); display: flex; align-items: center; justify-content: center; color: var(--first-color); font-size: 2.5rem; margin: 0 auto 1rem; }
    .profile-name { text-align: center; font-size: var(--h3-font-size); font-weight: var(--font-semi-bold); color: var(--title-color); }
    .profile-email { text-align: center; font-size: var(--small-font-size); color: var(--text-color); margin-top: .25rem; margin-bottom: 1.25rem; }
    .profile-stat { display: flex; justify-content: space-around; border-top: 2px solid var(--border-color); padding-top: 1rem; margin-top: .5rem; }
    .profile-stat-item { text-align: center; }
    .profile-stat-val { font-size: var(--h2-font-size); font-weight: var(--font-semi-bold); color: var(--first-color); }
    .profile-stat-label { font-size: var(--smaller-font-size); color: var(--text-color); }
    .btn-logout { display: block; width: 100%; margin-top: 1.25rem; text-align: center; padding: .65rem; background: var(--body-color); border: 2px solid var(--border-color); border-radius: .5rem; color: var(--text-color); font-size: var(--small-font-size); font-weight: var(--font-medium); cursor: pointer; transition: .3s; font-family: var(--body-font); }
    .btn-logout:hover { border-color: hsl(0,65%,55%); color: hsl(0,65%,55%); }

    /* TABS */
    .tabs { display: flex; gap: .5rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .tab-btn { background: var(--body-color); border: 2px solid var(--border-color); border-radius: .5rem; padding: .45rem 1rem; font-size: var(--small-font-size); font-weight: var(--font-medium); color: var(--text-color); cursor: pointer; transition: .3s; font-family: var(--body-font); }
    .tab-btn.active { background: var(--first-color); border-color: var(--first-color); color: #fff; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* WISHLIST / ENQUIRIES LISTS */
    .wishlist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
    .mini-card { background: var(--body-color); border: 2px solid var(--border-color); border-radius: .75rem; overflow: hidden; transition: .3s; }
    .mini-card:hover { border-color: var(--first-color); }
    .mini-card img { width: 100%; height: 120px; object-fit: cover; display: block; }
    .mini-card__body { padding: .75rem; }
    .mini-card__title { font-size: var(--small-font-size); font-weight: var(--font-semi-bold); color: var(--title-color); margin-bottom: .2rem; }
    .mini-card__price { font-size: var(--smaller-font-size); color: var(--first-color); font-weight: var(--font-semi-bold); }
    .mini-card__actions { display: flex; gap: .5rem; margin-top: .5rem; }
    .mini-btn { flex: 1; padding: .35rem; font-size: var(--smaller-font-size); text-align: center; border-radius: .3rem; transition: .3s; cursor: pointer; border: none; font-family: var(--body-font); }
    .mini-btn-view { background: var(--first-color-lighten); color: var(--first-color); }
    .mini-btn-view:hover { background: var(--first-color); color: #fff; }
    .mini-btn-remove { background: var(--body-color); border: 1px solid var(--border-color); color: var(--text-color); }
    .mini-btn-remove:hover { border-color: hsl(0,65%,55%); color: hsl(0,65%,55%); }

    /* ENQUIRY ITEM */
    .enquiry-item { background: var(--body-color); border: 2px solid var(--border-color); border-radius: .75rem; padding: .85rem 1rem; display: flex; justify-content: space-between; align-items: center; margin-bottom: .65rem; }
    .enquiry-title { font-size: var(--small-font-size); font-weight: var(--font-semi-bold); color: var(--title-color); }
    .enquiry-date { font-size: var(--smaller-font-size); color: var(--text-color); margin-top: .2rem; }
    .badge { padding: .2rem .6rem; border-radius: .25rem; font-size: var(--smaller-font-size); font-weight: var(--font-semi-bold); }
    .badge-pending { background: hsl(40,80%,92%); color: hsl(40,70%,35%); }
    .badge-confirmed { background: hsl(140,60%,92%); color: hsl(140,55%,30%); }
    .dark-theme .badge-pending { background: hsl(40,50%,18%); color: hsl(40,70%,60%); }
    .dark-theme .badge-confirmed { background: hsl(140,40%,15%); color: hsl(140,55%,55%); }

    .empty-tab { text-align: center; padding: 2.5rem 1rem; color: var(--text-color); }
    .empty-tab i { font-size: 2.5rem; color: var(--border-color); display: block; margin-bottom: .75rem; }
    .empty-tab p { font-size: var(--small-font-size); }

    @media (max-width: 768px) {
      .profile-grid { grid-template-columns: 1fr; }
      .nav__links { display: none; }
    }
  </style>
</head>
<body>

<header class="header">
  <nav>
    <a href="index.html" class="nav__logo">JM&amp;RA <i class='bx bxs-buildings'></i></a>
    <div class="nav__links">
      <a href="index.html">Home</a>
      <a href="properties.html">Properties</a>
      <a href="profile.html">My Profile</a>
    </div>
    <div style="display:flex;gap:.75rem;align-items:center;">
      <button class="theme-btn" id="theme-button"><i class='bx bx-moon'></i></button>
    </div>
  </nav>
</header>

<main class="profile-page">
  <div class="container">
    <span class="section__subtitle">Account</span>
    <h2 class="section__title" style="margin-bottom:1.5rem;">My <span>Profile</span></h2>

    <div class="profile-grid">

      <!-- SIDEBAR -->
      <div class="panel">
        <div class="profile-avatar"><i class='bx bx-user'></i></div>
        <div class="profile-name" id="profile-name">Guest</div>
        <div class="profile-email" id="profile-email"></div>
        <div class="profile-stat">
          <div class="profile-stat-item">
            <div class="profile-stat-val" id="stat-wishlist">0</div>
            <div class="profile-stat-label">Saved</div>
          </div>
          <div class="profile-stat-item">
            <div class="profile-stat-val" id="stat-enquiries">0</div>
            <div class="profile-stat-label">Enquiries</div>
          </div>
        </div>
        <button class="btn-logout" onclick="logout()"><i class='bx bx-log-out'></i> Sign Out</button>
      </div>

      <!-- TABS -->
      <div class="panel">
        <div class="tabs">
          <button class="tab-btn active" onclick="switchTab('wishlist', this)">
            <i class='bx bx-heart'></i> Saved Properties
          </button>
          <button class="tab-btn" onclick="switchTab('enquiries', this)">
            <i class='bx bx-calendar-check'></i> Viewing Requests
          </button>
        </div>

        <!-- WISHLIST -->
        <div class="tab-content active" id="tab-wishlist">
          <div class="wishlist-grid" id="wishlist-grid"></div>
        </div>

        <!-- ENQUIRIES -->
        <div class="tab-content" id="tab-enquiries">
          <div id="enquiries-list"></div>
        </div>
      </div>

    </div>
  </div>
</main>

<script>
  // Redirect if not logged in
  const user = JSON.parse(localStorage.getItem('user'));
  if (!user) { window.location.href = 'login.html'; }

  document.getElementById('profile-name').textContent  = user?.name  || 'User';
  document.getElementById('profile-email').textContent = user?.email || '';

  // Default properties
  const DEFAULT_PROPERTIES = [
    { id: 1, title: 'Koregaon Park Bungalow', price: '₹1.8 Cr', location: 'Pune',      image: 'assets/img/popular1.jpg' },
    { id: 2, title: 'Pedar Road Cottage', price: '₹2.4 Cr', location: 'Mumbai',    image: 'assets/img/popular2.jpg' },
    { id: 3, title: 'Colva Holiday Home', price: '₹1.2 Cr', location: 'Goa',       image: 'assets/img/popular3.jpg' },
    { id: 4, title: 'Garden Nest',    price: '₹1.69 Cr', location: 'Bangalore', image: 'assets/img/popular4.jpg' },
    { id: 5, title: 'Palmolive Villa',    price: '₹1.9 Cr',  location: 'Delhi',     image: 'assets/img/popular5.jpg' }
  ];
  const stored = JSON.parse(localStorage.getItem('properties')) || [];
  const ALL    = [...DEFAULT_PROPERTIES, ...stored];

 const wishlistKey  = 'wishlist_'  + (user?.email || 'guest');
 const enquiriesKey = 'enquiries_' + (user?.email || 'guest');

 function getWishlist()   { return JSON.parse(localStorage.getItem(wishlistKey))   || []; }
 function getEnquiries()  { return JSON.parse(localStorage.getItem(enquiriesKey))  || []; }

 function removeWishlist(id) {
  const w = getWishlist().filter(x => x !== id);
  localStorage.setItem(wishlistKey, JSON.stringify(w));
  renderWishlist();
}

  function renderWishlist() {
    const ids   = getWishlist();
    const grid  = document.getElementById('wishlist-grid');
    const props = ALL.filter(p => ids.includes(p.id));
    document.getElementById('stat-wishlist').textContent = props.length;
    grid.innerHTML = '';
    if (props.length === 0) {
      grid.innerHTML = '<div class="empty-tab" style="grid-column:1/-1"><i class="bx bx-heart"></i><p>No saved properties yet.<br><a href="properties.html" style="color:var(--first-color)">Browse properties</a></p></div>';
      return;
    }
    props.forEach(p => {
      grid.innerHTML += `
        <div class="mini-card">
          <img src="${p.image}" alt="${p.title}" onerror="this.style.display='none'">
          <div class="mini-card__body">
            <div class="mini-card__title">${p.title}</div>
            <div class="mini-card__price">${p.price}</div>
            <div class="mini-card__actions">
              <button class="mini-btn mini-btn-view" onclick="window.location='property.html?id=${p.id}'">View</button>
              <button class="mini-btn mini-btn-remove" onclick="removeWishlist(${p.id})">Remove</button>
            </div>
          </div>
        </div>`;
    });
  }

  function renderEnquiries() {
    const enqs = getEnquiries();
    const list = document.getElementById('enquiries-list');
    document.getElementById('stat-enquiries').textContent = enqs.length;
    list.innerHTML = '';
    if (enqs.length === 0) {
      list.innerHTML = '<div class="empty-tab"><i class="bx bx-calendar"></i><p>No viewing requests yet.<br><a href="properties.html" style="color:var(--first-color)">Browse properties</a></p></div>';
      return;
    }
    enqs.forEach(e => {
      const badge = e.status === 'confirmed'
        ? '<span class="badge badge-confirmed">Confirmed</span>'
        : '<span class="badge badge-pending">Pending</span>';
      list.innerHTML += `
        <div class="enquiry-item">
          <div>
            <div class="enquiry-title">${e.property}</div>
            <div class="enquiry-date"><i class='bx bx-calendar'></i> ${e.date} — ${e.message}</div>
          </div>
          ${badge}
        </div>`;
    });
  }

  function switchTab(name, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = 'index.html';
  }

  // Theme
  const themeBtn = document.getElementById('theme-button');
  if (localStorage.getItem('selected-theme') === 'dark') { document.body.classList.add('dark-theme'); themeBtn.querySelector('i').className = 'bx bx-sun'; }
  themeBtn.addEventListener('click', () => {
    document.body.classList.toggle('dark-theme');
    const isDark = document.body.classList.contains('dark-theme');
    themeBtn.querySelector('i').className = isDark ? 'bx bx-sun' : 'bx bx-moon';
    localStorage.setItem('selected-theme', isDark ? 'dark' : 'light');
  });

  renderWishlist();
  renderEnquiries();
</script>
<script src="calculator.js"></script>
</body>
</html>
