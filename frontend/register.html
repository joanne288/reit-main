
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="assets/img/favicon.ico" type="image/x-icon">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link rel="stylesheet" href="assets/css/styles.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <title>Register — JM&amp;RA</title>
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }
    .auth-card {
      background-color: var(--container-color);
      border: 2px solid var(--border-color);
      border-radius: 1.25rem;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 16px 40px hsla(220, 60%, 20%, .1);
    }
    .auth-logo { text-align: center; margin-bottom: 1.75rem; }
    .auth-logo a {
      font-size: var(--h2-font-size);
      font-weight: var(--font-semi-bold);
      color: var(--first-color);
      display: inline-flex;
      align-items: center;
      gap: .4rem;
    }
    .auth-title { font-size: var(--h2-font-size); color: var(--title-color); text-align: center; margin-bottom: .4rem; }
    .auth-subtitle { font-size: var(--small-font-size); color: var(--text-color); text-align: center; margin-bottom: 2rem; }
    .form-group { display: flex; flex-direction: column; gap: .3rem; margin-bottom: 1rem; }
    .form-label { font-size: var(--smaller-font-size); font-weight: var(--font-semi-bold); color: var(--text-color); text-transform: uppercase; letter-spacing: .04em; }
    .input-wrap { position: relative; }
    .input-wrap i { position: absolute; left: .85rem; top: 50%; transform: translateY(-50%); color: var(--text-color); font-size: 1.1rem; }
    .form-input {
      background-color: var(--body-color);
      border: 2px solid var(--border-color);
      border-radius: .5rem;
      padding: .7rem .85rem .7rem 2.5rem;
      font-size: var(--small-font-size);
      color: var(--title-color);
      width: 100%;
      transition: border-color .3s;
    }
    .form-input:focus { border-color: var(--first-color); outline: none; }
    .form-input::placeholder { color: var(--text-color); }
    .auth-btn { width: 100%; padding: .8rem; margin-top: .5rem; font-size: var(--normal-font-size); text-align: center; display: block; }
    .auth-footer { text-align: center; margin-top: 1.25rem; font-size: var(--small-font-size); color: var(--text-color); }
    .auth-footer a { color: var(--first-color); font-weight: var(--font-medium); }
    .auth-error { background: hsl(0, 70%, 95%); color: hsl(0, 65%, 45%); border: 1px solid hsl(0, 70%, 85%); border-radius: .5rem; padding: .65rem .85rem; font-size: var(--small-font-size); margin-bottom: 1rem; display: none; }
    .auth-success { background: hsl(140, 60%, 94%); color: hsl(140, 55%, 30%); border: 1px solid hsl(140, 60%, 80%); border-radius: .5rem; padding: .65rem .85rem; font-size: var(--small-font-size); margin-bottom: 1rem; display: none; }
    .dark-theme .auth-error { background: hsl(0, 40%, 15%); color: hsl(0, 70%, 65%); border-color: hsl(0, 40%, 25%); }
    .dark-theme .auth-success { background: hsl(140, 40%, 12%); color: hsl(140, 60%, 55%); border-color: hsl(140, 40%, 22%); }
    .theme-toggle { position: fixed; top: 1.25rem; right: 1.25rem; background: var(--container-color); border: 2px solid var(--border-color); border-radius: .5rem; padding: .4rem .6rem; cursor: pointer; color: var(--title-color); font-size: 1.1rem; transition: .3s; }
    .theme-toggle:hover { border-color: var(--first-color); color: var(--first-color); }
  </style>
</head>
<body>

<button class="theme-toggle" id="theme-button"><i class='bx bx-moon'></i></button>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="index.html">JM&amp;RA <i class='bx bxs-buildings'></i></a>
    </div>
    <h2 class="auth-title">Create account</h2>
    <p class="auth-subtitle">Join JM&amp;RA to explore properties</p>

    <div class="auth-error" id="error-msg"></div>
    <div class="auth-success" id="success-msg"></div>

    <div class="form-group">
      <label class="form-label">Full Name</label>
      <div class="input-wrap">
        <i class='bx bx-user'></i>
        <input class="form-input" type="text" id="name" placeholder="Your full name">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <div class="input-wrap">
        <i class='bx bx-envelope'></i>
        <input class="form-input" type="email" id="email" placeholder="you@example.com">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrap">
        <i class='bx bx-lock-alt'></i>
        <input class="form-input" type="password" id="password" placeholder="Min. 6 characters">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Confirm Password</label>
      <div class="input-wrap">
        <i class='bx bx-lock-alt'></i>
        <input class="form-input" type="password" id="confirm" placeholder="Repeat password">
      </div>
    </div>

    <button class="button auth-btn" onclick="handleRegister()">Create Account</button>

    <div style="display:flex;align-items:center;gap:.75rem;margin:1.25rem 0;">
      <div style="flex:1;height:1px;background:var(--border-color);"></div>
      <span style="font-size:var(--smaller-font-size);color:var(--text-color);">or sign up with</span>
      <div style="flex:1;height:1px;background:var(--border-color);"></div>
    </div>
    <div style="display:flex;justify-content:center;">
      <div id="g_id_onload" data-client_id="536470340798-8obomi7mihtdpljtevqupqn6jm70vaeb.apps.googleusercontent.com" data-callback="handleGoogleLogin" data-auto_prompt="false"></div>
      <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline" data-text="signup_with" data-size="large" data-width="360" data-logo_alignment="left"></div>
    </div>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>

<script>
  async function handleRegister() {
    const name     = document.getElementById('name').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const confirm  = document.getElementById('confirm').value.trim();
    const errEl    = document.getElementById('error-msg');
    const sucEl    = document.getElementById('success-msg');
    errEl.style.display = 'none';
    sucEl.style.display = 'none';

    if (!name || !email || !password || !confirm) {
      errEl.textContent = 'Please fill in all fields.'; errEl.style.display = 'block'; return;
    }
    if (password !== confirm) {
      errEl.textContent = 'Passwords do not match.'; errEl.style.display = 'block'; return;
    }
    if (password.length < 6) {
      errEl.textContent = 'Password must be at least 6 characters.'; errEl.style.display = 'block'; return;
    }

    try {
      const res  = await fetch('https://reit-main.onrender.com/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });
      const data = await res.json();

      if (!res.ok) {
        errEl.textContent = data.message || 'Registration failed.';
        errEl.style.display = 'block';
        return;
      }

      sucEl.textContent = 'Account created! Redirecting to login…';
      sucEl.style.display = 'block';
      setTimeout(() => window.location.href = 'login.html', 1800);

    } catch (err) {
      errEl.textContent = 'Cannot connect to server. Is the backend running?';
      errEl.style.display = 'block';
    }
  }

  // Google callback
  async function handleGoogleLogin(response) {
    const errEl = document.getElementById('error-msg');
    errEl.style.display = 'none';
    try {
      const res  = await fetch('https://reit-main.onrender.com/api/auth/google', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ credential: response.credential })
      });
      const data = await res.json();
      if (!res.ok) {
        errEl.textContent = data.message || 'Google sign up failed.';
        errEl.style.display = 'block';
        return;
      }
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = 'index.html';
    } catch (err) {
      errEl.textContent = 'Cannot connect to server.';
      errEl.style.display = 'block';
    }
  }

  // Theme
  const themeBtn = document.getElementById('theme-button');
  if (localStorage.getItem('selected-theme') === 'dark') {
    document.body.classList.add('dark-theme');
    themeBtn.querySelector('i').className = 'bx bx-sun';
  }
  themeBtn.addEventListener('click', () => {
    document.body.classList.toggle('dark-theme');
    const isDark = document.body.classList.contains('dark-theme');
    themeBtn.querySelector('i').className = isDark ? 'bx bx-sun' : 'bx bx-moon';
    localStorage.setItem('selected-theme', isDark ? 'dark' : 'light');
  });
</script>
</body>
</html>
